<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Order</title>
    <!-- mobile metas -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/css/myOrder.css">
    <link rel="stylesheet" href="/css/account-nav.css">
    <!-- Responsive -->
    <link rel="stylesheet" href="/css/responsive.css">
    <!-- fevicon -->
    <link rel="icon" href="/images/fevicon.png" type="image/gif" />
    <!-- Tweaks for older IEs -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="main-layout">
<input type="hidden" id="searchContext" value="myOrder">
<div th:replace="~{fragments/account-section-nav :: nav('order')}"></div>
<div class="account-page-toolbar">
    <div class="account-page-search">
        <input type="text" id="orderSearch" class="account-search-input" placeholder="Tim theo ma don hang...">
        <button class="account-search-button" type="button" aria-label="Tim kiem don hang">
            <i class="fas fa-search"></i>
        </button>
    </div>
</div>
<!-- content -->
<div id="content_order">
    <div class="col-12 padding-div">
        <h2 class="h3 mb-3 text-black">Đơn hàng của tôi</h2>
        <div class="filter-controls">
            <select id="sortByDate" class="sort-select">
                <option value="newest">Mới nhất</option>
                <option value="oldest">Cũ nhất</option>
            </select>
        </div>
        <div id="orderList">
            <!-- Danh sách đơn hàng sẽ được render bằng JS -->
        </div>
    </div>
</div>
<!-- end-content -->

<!-- Modal -->
<div id="orderItemsModal" class="modal">
    <div class="modal-content">
        <span class="close">×</span>
        <h3>Chi tiết đơn hàng</h3>
        <div id="orderItemsList" class="order-items-list">
            <!-- Danh sách items sẽ được render bằng JS -->
        </div>
    </div>
</div>
<script src="/js/service/web/my-orders.js"></script>
</body>
</html>
