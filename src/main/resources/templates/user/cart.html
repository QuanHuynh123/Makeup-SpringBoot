<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/css/myOrder.css">
    <link rel="stylesheet" href="/css/account-nav.css">
    <link rel="stylesheet" href="/css/cart.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="icon" href="/images/fevicon.png" type="image/gif" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="main-layout">

<div>
    <input type="hidden" id="searchContext" value="cart">
    <div th:replace="~{fragments/account-section-nav :: nav('cart')}"></div>
    <div class="cart-container">
        <div class="cart-items">
            <h4 class="cart-title">Your Cart</h4>
            <table class="cart-table">
                <thead>
                <tr>
                    <th class="col-product">Products</th>
                    <th class="align-th col-price">Price</th>
                    <th class="align-th col-quantity">Quantity</th>
                    <th class="align-th col-total">Total</th>
                    <th class="align-th col-action"></th>
                    <th class="align-th col-action"></th>
                </tr>
                </thead>
                <tbody class="cart-table-body">
                <tr th:if="${error != null and error != ''}">
                    <td colspan="6" class="cart-notice-row">
                        <div class="alert alert-warning" role="alert">
                            <span th:text="${error}"></span>
                        </div>
                    </td>
                </tr>

                <tr th:if="${(error == null or error == '') and (cartItems == null or #lists.isEmpty(cartItems))}">
                    <td colspan="6" class="cart-notice-row">Giỏ hàng của bạn đang trống.</td>
                </tr>

                <tr class="cart-item-row" th:if="${error == null or error == ''}" th:each="item : ${cartItems}" th:attr="cart-id=${item.id}">
                    <td class="align-th cart-item-infor">
                        <div class="cart-product">
                            <img th:src="@{'/images/product/' + ${item.firstImage}}" alt="Product Image"
                                 class="cart-product-image">
                            <input class="product-id" style="display: none;" th:value="${item.productId}">
                            <div class="infor">
                                <p class="cart-product-name" th:text="${item.productName}">Product Name</p>
                                <p class="cart-product-size">Size : S</p>
                                <input type="date" class="use-date"
                                       th:value="${#temporals.format(item.rentalDate, 'yyyy-MM-dd')}">
                            </div>
                        </div>
                    </td>
                    <td class="align-th unit-price" th:text="${item.price}">$45.90</td>
                    <td class="align-th">
                        <div class="quantity-control">
                            <button class="button-update-quantity quantity-decrease">-</button>
                            <input class="quantity-input" th:value="${item.quantity}">
                            <button class="button-update-quantity quantity-increase">+</button>
                        </div>
                    </td>
                    <td class="align-th" th:text="${item.price * item.quantity}">$100.90</td>
                    <td class="align-th">
                        <button class="btn-update-cart-item">
                            <i class="fa fa-rotate-right"></i>
                        </button>
                    </td>
                    <td class="align-th">
                        <button class="btn-delete-cart-item">
                            <i class="fa fa-times"></i>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <aside class="cart-summary">
            <h3>Order Summary</h3>
            <div class="shipping-info">
                <div class="shipping-progress-head">
                    <span>Free Shipping Progress</span>
                    <strong class="js-free-progress-text">$0.00 / $300.00</strong>
                </div>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill js-free-progress-bar" style="width: 0%;"></div>
                </div>
                <p class="shipping-note js-free-progress-note">Add items to unlock free shipping.</p>
            </div>

            <div class="summary-lines">
                <div class="cart-subtotal">
                    <span>Cart subtotal</span>
                    <span class="js-subtotal">$0.00</span>
                </div>

                <div class="shipping-line">
                    <div class="shipping-text">
                        <strong>Shipping & Handling</strong>
                        <span>India</span>
                        <a href="#">Change address</a>
                    </div>
                    <div class="shipping-value js-shipping-fee">$46.15</div>
                </div>

                <hr>

                <div class="grand-total">
                    <span>Grand total</span>
                    <span class="js-grand-total" th:if="${cart != null}" th:text="${cart.totalPrice}">$181.15</span>
                    <span class="js-grand-total" th:unless="${cart != null}">$0.00</span>
                </div>
            </div>

            <div class="summary-actions">
                <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
                <button class="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
            </div>
        </aside>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/service/cart.js"></script>

</body>
</html>
