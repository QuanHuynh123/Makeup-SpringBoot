spring.application.name=Makeup-dev
logging.level.com.example.Makeup=DEBUG

########### CONFIG CONNECT MYSQL (Docker Compose service)
spring.datasource.url=jdbc:mysql://mysql:3306/makeup?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}

########### Config JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

############ CONFIG Migration DB
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

########### CONFIG RabbitMQ (Docker)
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=myuser
spring.rabbitmq.password=mypassword

########### CONFIG Redis
spring.cache.type=redis
spring.redis.host=redis-dev:localhost
spring.redis.port=6379
spring.redis.timeout=500ms
# If you are using Redis with password authentication, uncomment the following line and set your password
# spring.redis.password=your_password

########### CONFIG SPRING AI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat-model=gpt-4o

# Secret JWT (Base64 encoded)
jwt.secret=${JWT_SECRET}

# Refresh token: 7 days
refresh.expiration=604800000

# JWT access token: 2 hours
jwt.expiration=7200000

# Cookie max age in seconds
cookie.maxAge=604800
