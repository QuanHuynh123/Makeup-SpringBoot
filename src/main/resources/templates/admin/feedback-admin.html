<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Danh Sách Phản Hồi Dịch Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link type="text/css" href="../css/feedback.css" rel="stylesheet" />
</head>

<body>
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" role="dialog" aria-labelledby="confirmDeleteModalLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="confirmDeleteModalLabel">Xác Nhận Xóa</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Bạn có chắc chắn muốn xóa phản hồi này không?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteButton">Xóa</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="text-center mb-3">
        <h1>Danh Sách Phản Hồi Dịch Vụ</h1>
    </div>

    <div class="d-flex justify-content-between mb-3">
        <div class="form-inline">
            <input class="form-control" type="text" placeholder="Tìm kiếm phản hồi" id="searchFeedback">
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-hover text-center">
            <thead>
            <tr>
                <th>Mã</th>
                <th>Điểm Đánh Giá</th>
                <th>Bình Luận</th>
                <th>Khách Hàng</th>
                <th>Dịch Vụ Makeup</th>
                <th>Ngày Tạo</th>
                <th>Ngày Cập Nhật</th>
                <th>Hành Động</th>
            </tr>
            </thead>
            <tbody id="table-content-feedbacks">
            <th:block th:if="${#lists.isEmpty(feedbackList)}">
                <tr>
                    <td colspan="8" class="text-center">Không có phản hồi nào</td>
                </tr>
            </th:block>

            <tr th:if="${feedbackList != null and !#lists.isEmpty(feedbackList)}"
                th:each="feedback,stat : ${feedbackList}">
                <td th:text="${feedback.id}">ID</td>
                <td th:text="${feedback.rating}">Điểm Đánh Giá</td>
                <td th:text="${feedback.comment}">Bình Luận</td>
                <td th:text="${feedback.userId}">Khách Hàng</td>
                <td th:text="${feedback.typeMakeupId}">Dịch Vụ Makeup</td>
                <td th:text="${#temporals.format(feedback.createdAt, 'dd/MM/yyyy HH:mm')}">Ngày Tạo</td>
                <td th:text="${#temporals.format(feedback.updatedAt, 'dd/MM/yyyy HH:mm')}">Ngày Cập Nhật</td>
                <td>
                    <button type="button" class="btn btn-warning btn-sm" th:attr="data-id=${feedback.id}">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button type="button" class="btn btn-danger btn-sm" th:attr="data-id=${feedback.id}">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/service/admin/feedback.js"></script>
</body>
</html>
