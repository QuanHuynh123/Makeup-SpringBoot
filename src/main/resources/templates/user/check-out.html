<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/css/myOrder.css">
    <link rel="stylesheet" href="/css/account-nav.css">
    <link rel="stylesheet" href="/css/checkOut.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="icon" href="/images/fevicon.png" type="image/gif" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body class="main-layout checkout-page">
<input type="hidden" id="searchContext" value="checkout">

<div th:replace="~{fragments/account-section-nav :: nav('cart')}"></div>

<main class="checkout-shell">
    <section class="checkout-grid">
        <article class="checkout-card checkout-card--form">
            <div class="checkout-card__head">
                <span class="checkout-card__kicker">Pickup Details</span>
                <h1>Confirm Information</h1>
                <p>Review your contact information before placing this order.</p>
            </div>

            <form class="checkout-form" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" th:value="${user != null ? user.email : ''}" required>
                </div>

                <div class="form-group">
                    <label for="firstName">Name</label>
                    <input type="text" id="firstName" name="firstName" th:value="${user != null ? user.fullName : ''}" required>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Enter your phone number" th:value="${user != null ? user.phone : ''}" required>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="Enter your address" th:value="${user != null ? user.address : ''}" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="Any note for the store (optional)"></textarea>
                </div>

                <div class="checkout-choice-group shipping-option">
                    <label class="choice-title">Shipping Option</label>
                    <label class="choice-item" for="shipping">
                        <input type="checkbox" id="shipping" name="shipping">
                        <span>Add shipping service (+$30)</span>
                    </label>
                </div>

                <div class="checkout-choice-group payment-method-section">
                    <label class="choice-title">Payment Method</label>
                    <label class="choice-item" id="div_directly" for="paymentInStore">
                        <input type="radio" id="paymentInStore" name="paymentMethod" value="1" checked>
                        <span>Directly at Store</span>
                    </label>
                    <label class="choice-item" id="div_vnpay" for="vnpay">
                        <input type="radio" id="vnpay" name="paymentMethod" value="2">
                        <span class="payment-vnpay">
                            <img src="/images/Logo-VNPAY-QR.webp" alt="VNPAY Logo">
                            Thanh toan qua VNPAY
                        </span>
                    </label>
                </div>
            </form>
        </article>

        <aside class="checkout-card checkout-card--summary">
            <div class="checkout-card__head">
                <span class="checkout-card__kicker">Order</span>
                <h2>Summary</h2>
            </div>

            <div class="product-table-container">
                <table class="product-table">
                    <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Subtotal</th>
                    </tr>
                    </thead>
                    <tbody id="productTableBody">
                    </tbody>
                </table>
            </div>

            <div id="summarySection" class="summary-box">
                <div class="summary-row">
                    <span>Quantity</span>
                    <span id="cartQuantity">0</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span id="shippingCost">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Order Total</span>
                    <span id="orderTotal">$0.00</span>
                </div>
            </div>

            <button class="btn btn-place" type="button">Place Order</button>
        </aside>
    </section>

    <section class="store-section">
        <div class="store-card">
            <h3>Store Address</h3>
            <p id="storeAddress">273 An Duong Vuong, Ward 3, District 5, Ho Chi Minh City, Vietnam</p>
            <div id="map-container">
                <iframe
                        src="https://www.google.com/maps/embed/v1/place?key=AIzaSyA0s1a7phLN0iaD6-UE7m4qP-z21pH0eSc&q=Truong+Dai+hoc+Sai+Gon+273+An+Duong+Vuong+Phuong+3+Quan+5+Ho+Chi+Minh+700000"
                        width="600"
                        height="420"
                        frameborder="0"
                        style="border:0; width: 100%;"
                        allowfullscreen>
                </iframe>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/service/web/checkout.js"></script>
</body>
</html>
