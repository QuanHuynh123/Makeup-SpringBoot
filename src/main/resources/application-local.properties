spring.application.name=Makeup-local
logging.level.com.example.Makeup=DEBUG

########### Local datasource (run services on your machine)
spring.datasource.url=jdbc:mysql://localhost:3306/makeup?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}

########### Local middleware
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=3s
spring.data.redis.timeout=3s
spring.data.redis.connect-timeout=3s

########### Developer-friendly diagnostics
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
