# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build, Push Docker, Deploy EC2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn clean install -DskipTests

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package jar for Docker context
        run: mvn -DskipTests clean package

      - name: Verify packaged jar exists
        run: ls -la target

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: quancoder123/makeup-images:latest

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/Makeup"
            fi
            SRC_DIR="$APP_DIR/_src"
            IMAGE="quancoder123/makeup-images:latest"

            if ! command -v git >/dev/null 2>&1; then
              echo "git not found. Installing git..."
              if command -v yum >/dev/null 2>&1; then
                sudo yum install -y git
              elif command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y git
              elif command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -y
                sudo apt-get install -y git
              else
                echo "No supported package manager found to install git"
                exit 1
              fi
            fi

            mkdir -p "$APP_DIR"
            if [ ! -d "$SRC_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$SRC_DIR"
            fi

            cd "$SRC_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker pull "$IMAGE"

            # Keep infra services from compose, but run app with pulled image from Docker Hub.
            docker compose up -d mysql redis rabbitmq

            cat > docker-compose.deploy.override.yml << 'EOF'
            services:
              app:
                image: quancoder123/makeup-images:latest
                build: null
            EOF

            docker compose -f docker-compose.yml -f docker-compose.deploy.override.yml up -d app --no-deps
            docker image prune -f

